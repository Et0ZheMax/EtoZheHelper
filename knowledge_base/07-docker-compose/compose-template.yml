services:
  app:
    image: example/app:latest
    container_name: example-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://app:app@db:5432/app
    depends_on:
      - db
    volumes:
      - app_data:/app/data

  db:
    image: postgres:16
    container_name: example-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: change-me
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  app_data:
  db_data:
